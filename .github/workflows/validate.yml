name: Validate skill

# Runs the AST validator against a fresh checkout of LorenFrankLab/spyglass
# master, so drift between this skill's prose and the live Spyglass source
# fails CI before it reaches users.
#
# Weekly schedule catches upstream drift even when nothing in this repo
# changes — if Spyglass renames a method or drops a kwarg, the skill breaks
# silently otherwise.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Mondays 13:00 UTC — early-week signal without pinging on weekends.
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN needs issues:write so the drift-detection step can
    # open/update an issue on scheduled-run failures. Everything else
    # only needs the default read scope.
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout spyglass-skill
        uses: actions/checkout@v4
        with:
          path: spyglass-skill

      - name: Checkout LorenFrankLab/spyglass (live master)
        uses: actions/checkout@v4
        with:
          repository: LorenFrankLab/spyglass
          # Leave ref unset to track master — drift detection is the point.
          path: spyglass

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        # Version pinned to match .pre-commit-config.yaml so local and CI
        # report identically. Bump both when running `pre-commit autoupdate`.
        run: pip install ruff==0.14.6

      - name: Ruff lint
        working-directory: spyglass-skill
        run: ruff check .

      - name: Record spyglass revision under test
        id: spyglass_rev
        run: |
          cd spyglass
          SHA=$(git rev-parse --short HEAD)
          SUBJECT=$(git log -1 --format='%s (%an, %ai)')
          echo "Validating against spyglass @ $SHA"
          echo "  $SUBJECT"
          # Expose to later steps (e.g. drift-issue template).
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Run validator (main + regression fixtures)
        # Working dir is spyglass-skill so the sibling-clone fallback
        # finds ../spyglass/src automatically — no SPYGLASS_SRC needed.
        working-directory: spyglass-skill
        run: ./skills/spyglass/scripts/validate_all.sh --baseline-warnings 3

      - name: JSON sanity check
        working-directory: spyglass-skill
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool skills/spyglass/evals/evals.json > /dev/null

      - name: Open drift issue on scheduled failure
        # Only on the weekly cron: push/PR failures already have a human
        # looking at them, but scheduled runs go to email and can rot.
        # update_existing reuses the same issue across weeks so we don't
        # spam a new issue every Monday that drift persists.
        if: failure() && github.event_name == 'schedule'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPYGLASS_SHA: ${{ steps.spyglass_rev.outputs.sha }}
          SPYGLASS_SUBJECT: ${{ steps.spyglass_rev.outputs.subject }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: spyglass-skill/.github/drift-issue-template.md
          update_existing: true
